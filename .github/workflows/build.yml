name: Build Windows Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pyinstaller

    - name: Compile C++ Engine (Windows)
      run: |
        g++ rin-engine.cpp -o rin-engine.exe -static

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed `
        --icon="R.ico" `
        --name "RIN-ENGINE-V3" `
        --add-data "rin-engine.exe;." `
        rin_ui.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: RIN-ENGINE-WINDOWS-PACKAGE
        path: dist/RIN-ENGINE-V3.exe
